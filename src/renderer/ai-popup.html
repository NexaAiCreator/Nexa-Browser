<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-dark: #0a0a0b; --accent: #8ab4f8; --text-main: #e8eaed; --text-dim: #9aa0a6;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: thin; scrollbar-color: var(--glass-border) transparent;
        }
        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 15px;
            font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease;
        }
        .user-msg {
            align-self: flex-end; background: var(--accent); color: #000;
            border-bottom-right-radius: 2px;
        }
        .ai-msg {
            align-self: flex-start; background: var(--glass);
            border: 1px solid var(--glass-border); color: var(--text-main);
            border-bottom-left-radius: 2px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .brain-section {
            padding: 20px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; margin-bottom: 20px;
        }
        .orb {
            width: 60px; height: 60px; background: var(--accent);
            border-radius: 50%; box-shadow: 0 0 30px var(--accent);
            animation: pulse 3s infinite ease-in-out; margin-bottom: 15px;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        .status-text { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

        .input-area {
            padding: 20px; background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--glass-border);
            display: flex; gap: 10px; align-items: center;
        }
        #user-input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 10px 15px; color: white; outline: none;
        }
        .send-btn {
            width: 35px; height: 35px; border-radius: 50%; background: var(--accent);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chat">
        <div class="brain-section">
            <div class="orb"></div>
            <div class="status-text">Sovereign AI Standby</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask the brain...">
        <button class="send-btn" onclick="sendMessage()">➔</button>
    </div>

    <script src="nexabridge.js"></script>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('user-input');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            try {
                // Call the backend. The backend returns { id, result }
                // where result might be a string or an object { text: "..." }
                const response = await window.Nexa.call('nexabrain.summarize', { text: text });
                
                let finalBrainedText = "I'm having trouble processing that.";
                
                if (typeof response === 'string') {
                    finalBrainedText = response;
                } else if (response && typeof response === 'object') {
                    // Handle different possible Appwrite/Python API return shapes
                    finalBrainedText = response.text || response.result || response.content || JSON.stringify(response);
                }

                addMessage('ai', finalBrainedText);
            } catch (e) {
                addMessage('ai', "Error: " + e.message);
            }
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
