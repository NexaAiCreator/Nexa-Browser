<!DOCTYPE html>
<html>
<head>
    <title>Nexa Browser - Beta</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        button { background: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #357abd; }
        pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Nexa Browser Beta</h1>
    <div class="card">
        <h3>Backend Connection</h3>
        <button onclick="testPing()">Ping Backend</button>
        <pre id="ping-result">Waiting...</pre>
    </div>
    <div class="card">
        <h3>Bookmarks</h3>
        <button onclick="loadBookmarks()">Fetch Bookmarks</button>
        <pre id="bookmarks-result">No data</pre>
    </div>
    <div class="card">
        <h3>AI Summarizer</h3>
        <input type="text" id="ai-input" placeholder="Enter text..." style="width: 300px; padding: 8px;">
        <button onclick="doSummarize()">Summarize</button>
        <pre id="ai-result">No data</pre>
    </div>

    <script src="nexabridge.js"></script>
    <script>
        async function testPing() {
            try {
                const res = await window.Nexa.ping();
                document.getElementById('ping-result').textContent = "Response: " + res;
            } catch (e) {
                document.getElementById('ping-result').textContent = "Error: " + e.message;
            }
        }
        async function loadBookmarks() {
            try {
                const res = await window.Nexa.getBookmarks();
                document.getElementById('bookmarks-result').textContent = JSON.stringify(res, null, 2);
            } catch (e) {
                document.getElementById('bookmarks-result').textContent = "Error: " + e.message;
            }
        }
        async function doSummarize() {
            const text = document.getElementById('ai-input').value;
            try {
                const res = await window.Nexa.summarize(text);
                document.getElementById('ai-result').textContent = res;
            } catch (e) {
                document.getElementById('ai-result').textContent = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
